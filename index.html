<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>期货保证金查询</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ec;
      --panel: #ffffff;
      --soft: #f4f7fb;
      --brand: #1166d8;
      --brand-soft: #e8f1ff;
      --green: #07815f;
      --orange: #c46a17;
      --violet: #6a4bc3;
      --cyan: #087f9c;
      --rose: #c23270;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    header {
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .wrap {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .dot {
      width: 8px;
      height: 8px;
      display: inline-block;
      border-radius: 50%;
      background: var(--green);
      margin-right: 7px;
    }

    .dot.warn { background: var(--orange); }
    .dot.bad { background: #cc2b2b; }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      padding: 18px 0;
    }

    .search, select, button {
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
    }

    .search {
      width: 100%;
      padding: 0 14px;
    }

    select {
      min-width: 150px;
      padding: 0 34px 0 12px;
    }

    .refresh {
      padding: 0 14px;
      cursor: pointer;
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(23, 32, 51, 0.04);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .board {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(23, 32, 51, 0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid #edf1f5;
      text-align: right;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      color: var(--muted);
      background: #f8fafc;
      font-size: 12px;
      font-weight: 600;
    }

    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2),
    th:nth-child(3), td:nth-child(3) {
      text-align: left;
    }

    tbody tr:hover {
      background: var(--brand-soft);
    }

    .exchange {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 76px;
    }

    .swatch {
      width: 8px;
      height: 22px;
      border-radius: 5px;
      background: var(--brand);
      flex: 0 0 auto;
    }

    .code {
      color: var(--muted);
      font-size: 12px;
      margin-left: 6px;
    }

    .money {
      font-weight: 700;
      color: var(--brand);
    }

    .empty {
      padding: 44px 16px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
    }

    footer {
      color: var(--muted);
      font-size: 12px;
      padding: 18px 0 32px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 18px 0;
      }

      .status {
        align-items: flex-start;
        text-align: left;
      }

      .toolbar,
      .stats {
        grid-template-columns: 1fr;
      }

      .board {
        overflow-x: auto;
      }

      table {
        min-width: 760px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>期货保证金查询</h1>
        <div class="subtitle">自动更新主力合约行情与当前保证金比例</div>
      </div>
      <div class="status">
        <div><span id="statusDot" class="dot warn"></span><span id="statusText">正在加载</span></div>
        <div id="updatedAt">--</div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="toolbar" aria-label="查询条件">
      <input id="query" class="search" type="search" placeholder="输入品种、代码或交易所" autocomplete="off">
      <select id="exchange">
        <option value="">全部交易所</option>
      </select>
      <button id="refresh" class="refresh" type="button">刷新数据</button>
    </section>

    <section class="stats" aria-label="数据概览">
      <div class="stat"><span>可查询品种</span><strong id="totalCount">0</strong></div>
      <div class="stat"><span>当前显示</span><strong id="visibleCount">0</strong></div>
      <div class="stat"><span>最高每手保证金</span><strong id="maxMargin">--</strong></div>
    </section>

    <section class="board" aria-label="保证金列表">
      <table>
        <thead>
          <tr>
            <th style="width: 130px;">交易所</th>
            <th style="width: 150px;">品种</th>
            <th style="width: 150px;">代码/主力合约</th>
            <th>最新价</th>
            <th>合约乘数</th>
            <th>保证金比例</th>
            <th>每手保证金</th>
            <th>持仓量</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="8" class="empty">正在加载数据</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer class="wrap">数据每 10 分钟自动更新；站点与数据完整性由 GitHub Actions 自动自检。</footer>

  <script>
    const EXCHANGE_COLORS = {
      SHFE: "#1166d8",
      DCE: "#07815f",
      CZCE: "#c46a17",
      CFFEX: "#6a4bc3",
      INE: "#087f9c",
      GFEX: "#c23270"
    };

    const state = {
      items: [],
      payload: null,
      query: "",
      exchange: ""
    };

    const els = {
      query: document.getElementById("query"),
      exchange: document.getElementById("exchange"),
      refresh: document.getElementById("refresh"),
      rows: document.getElementById("rows"),
      totalCount: document.getElementById("totalCount"),
      visibleCount: document.getElementById("visibleCount"),
      maxMargin: document.getElementById("maxMargin"),
      statusDot: document.getElementById("statusDot"),
      statusText: document.getElementById("statusText"),
      updatedAt: document.getElementById("updatedAt")
    };

    function numberValue(value) {
      if (value === null || value === undefined || value === "") return null;
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function money(value) {
      const number = numberValue(value);
      if (number === null) return "--";
      if (number >= 10000) return `${(number / 10000).toFixed(number >= 100000 ? 1 : 2)}万元`;
      return `${Math.round(number).toLocaleString("zh-CN")}元`;
    }

    function compact(value) {
      const number = numberValue(value);
      if (number === null || number <= 0) return "--";
      if (number >= 10000) return `${(number / 10000).toFixed(1)}万`;
      return Math.round(number).toLocaleString("zh-CN");
    }

    function price(value) {
      const number = numberValue(value);
      if (number === null) return "--";
      return number >= 100 ? number.toFixed(number % 1 ? 2 : 0) : number.toFixed(2);
    }

    function percent(value) {
      const number = numberValue(value);
      return number === null ? "--" : `${(number * 100).toFixed(1)}%`;
    }

    function timeText(value) {
      if (!value) return "更新时间：--";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return `更新时间：${value}`;
      return `更新时间：${date.toLocaleString("zh-CN", { hour12: false })}`;
    }

    function contractText(value) {
      if (!value) return "";
      const text = String(value).split(".").pop();
      return ` / ${text}`;
    }

    function normalizePayload(raw) {
      if (Array.isArray(raw)) {
        return {
          status: "legacy",
          updatedAt: "",
          items: raw.map(item => ({
            code: item.c,
            name: item.n || item.c,
            exchange: item.e || "",
            exchangeName: item.e || "",
            price: item.p,
            openInterest: item.o,
            contractMultiplier: item.mul,
            marginRate: item.r || item.mr,
            marginPerLot: item.p && item.mul && (item.r || item.mr) ? item.p * item.mul * (item.r || item.mr) : null,
            contract: item.contract || ""
          }))
        };
      }
      return raw;
    }

    function setStatus(status, text) {
      els.statusDot.className = "dot";
      if (status === "fallback" || status === "legacy" || status === "loading") els.statusDot.classList.add("warn");
      if (status === "bad") els.statusDot.classList.add("bad");
      els.statusText.textContent = text;
    }

    function fillExchangeOptions() {
      const current = els.exchange.value;
      const exchanges = Array.from(new Map(
        state.items.map(item => [item.exchange, item.exchangeName || item.exchange]).filter(row => row[0])
      ));
      els.exchange.innerHTML = `<option value="">全部交易所</option>` + exchanges
        .map(([code, name]) => `<option value="${code}">${name}</option>`)
        .join("");
      els.exchange.value = exchanges.some(([code]) => code === current) ? current : "";
    }

    function filteredItems() {
      const query = state.query.trim().toLowerCase();
      return state.items.filter(item => {
        const searchText = `${item.name || ""} ${item.code || ""} ${item.exchange || ""} ${item.exchangeName || ""} ${item.contract || ""}`.toLowerCase();
        return (!query || searchText.includes(query)) && (!state.exchange || item.exchange === state.exchange);
      });
    }

    function render() {
      const rows = filteredItems();
      els.totalCount.textContent = state.items.length;
      els.visibleCount.textContent = rows.length;
      const maxMargin = rows.reduce((max, item) => Math.max(max, numberValue(item.marginPerLot) || 0), 0);
      els.maxMargin.textContent = maxMargin ? money(maxMargin) : "--";

      if (!rows.length) {
        els.rows.innerHTML = `<tr><td colspan="8" class="empty">没有匹配的品种</td></tr>`;
        return;
      }

      els.rows.innerHTML = rows.map(item => {
        const color = EXCHANGE_COLORS[item.exchange] || "#667085";
        return `
          <tr>
            <td><span class="exchange"><span class="swatch" style="background:${color}"></span>${item.exchangeName || item.exchange}</span></td>
            <td>${item.name || "--"}</td>
            <td><strong>${item.code}</strong><span class="code">${contractText(item.contract)}</span></td>
            <td>${price(item.price)}</td>
            <td>${compact(item.contractMultiplier)}</td>
            <td>${percent(item.marginRate)}</td>
            <td class="money">${money(item.marginPerLot)}</td>
            <td>${compact(item.openInterest)}</td>
          </tr>
        `;
      }).join("");
    }

    async function loadData() {
      setStatus("loading", "正在加载");
      const cache = `?t=${Date.now()}`;
      const urls = [`data/data.json${cache}`, `data.json${cache}`];
      let lastError;

      for (const url of urls) {
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(`${url} ${res.status}`);
          const payload = normalizePayload(await res.json());
          if (!payload || !Array.isArray(payload.items)) throw new Error("数据格式不正确");
          state.payload = payload;
          state.items = payload.items
            .filter(item => item && item.code)
            .map(item => ({ ...item, code: String(item.code).toUpperCase() }))
            .sort((a, b) => (numberValue(b.marginPerLot) || 0) - (numberValue(a.marginPerLot) || 0));
          fillExchangeOptions();
          render();
          setStatus(payload.status, payload.status === "fallback" ? "备用数据" : "数据正常");
          els.updatedAt.textContent = timeText(payload.updatedAt);
          return;
        } catch (error) {
          lastError = error;
        }
      }

      state.items = [];
      render();
      setStatus("bad", "加载失败");
      els.updatedAt.textContent = lastError ? String(lastError.message || lastError) : "数据不可用";
    }

    els.query.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    els.exchange.addEventListener("change", event => {
      state.exchange = event.target.value;
      render();
    });

    els.refresh.addEventListener("click", loadData);

    loadData();
  </script>
</body>
</html>
