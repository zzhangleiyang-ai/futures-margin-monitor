<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>期货保证金监控</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121c2f;
      --panel-2: #16243c;
      --line: #25344d;
      --text: #e8eef9;
      --muted: #8ea0bf;
      --gold: #f4c84e;
      --good: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.16), transparent 34%),
        linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .wrap {
      width: min(1400px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(11, 18, 32, 0.88);
      border-bottom: 1px solid rgba(142, 160, 191, 0.12);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 0;
    }

    .title {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      text-align: right;
      font-size: 13px;
      color: var(--muted);
    }

    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--good);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15);
      flex: 0 0 auto;
    }

    .dot.warn {
      background: var(--warn);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
    }

    .dot.bad {
      background: var(--bad);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
    }

    main {
      padding: 22px 0 40px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 180px 140px;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
    }

    input,
    select,
    button {
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(18, 28, 47, 0.96);
      color: var(--text);
      font: inherit;
      font-size: 14px;
    }

    input,
    select {
      padding: 0 14px;
    }

    button {
      cursor: pointer;
      background: linear-gradient(180deg, #1d4ed8 0%, #1d64f2 100%);
      border-color: #2d6df3;
      font-weight: 600;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .metric {
      min-height: 92px;
      padding: 16px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(18, 28, 47, 0.96), rgba(22, 36, 60, 0.96));
      border: 1px solid rgba(142, 160, 191, 0.14);
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-value {
      margin-top: 10px;
      font-size: 24px;
      line-height: 1.1;
      font-weight: 700;
    }

    .sections {
      display: grid;
      gap: 18px;
    }

    .exchange-section {
      padding: 0;
    }

    .exchange-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .exchange-title {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .exchange-bar {
      width: 5px;
      height: 28px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .exchange-name {
      font-size: 18px;
      font-weight: 700;
    }

    .exchange-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(276px, 1fr));
      gap: 12px;
    }

    .card {
      min-height: 168px;
      padding: 16px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(18, 28, 47, 0.96), rgba(22, 36, 60, 0.96));
      border: 1px solid rgba(142, 160, 191, 0.15);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--accent, #3b82f6);
    }

    .card-top {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      margin-bottom: 14px;
    }

    .name {
      font-size: 16px;
      font-weight: 700;
      min-width: 0;
    }

    .code {
      font-size: 12px;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .contract {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 14px;
    }

    .price {
      font-size: 28px;
      line-height: 1;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .facts {
      display: grid;
      gap: 8px;
    }

    .fact {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .fact strong {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    .fact .highlight {
      color: var(--gold);
    }

    .empty {
      padding: 56px 18px;
      border-radius: 10px;
      text-align: center;
      color: var(--muted);
      background: rgba(18, 28, 47, 0.88);
      border: 1px dashed rgba(142, 160, 191, 0.22);
    }

    footer {
      padding: 18px 0 34px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .topbar,
      .toolbar,
      .summary {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .status {
        align-items: flex-start;
        text-align: left;
      }

      .summary {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1 class="title">期货保证金监控</h1>
        <div class="subtitle">卡片式查看各期货品种最新保证金比例、每手保证金与当前主力合约</div>
      </div>
      <div class="status">
        <div class="status-line">
          <span id="statusDot" class="dot warn"></span>
          <span id="statusText">正在加载数据</span>
        </div>
        <div id="updatedAt">更新时间：--</div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="toolbar" aria-label="筛选">
      <input id="query" type="search" placeholder="搜索品种、代码、主力合约" autocomplete="off">
      <select id="exchange">
        <option value="">全部交易所</option>
      </select>
      <button id="refresh" type="button">刷新</button>
    </section>

    <section class="summary" aria-label="概览">
      <div class="metric">
        <div class="metric-label">可查询品种</div>
        <div id="totalCount" class="metric-value">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">当前显示</div>
        <div id="visibleCount" class="metric-value">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">最高保证金比例</div>
        <div id="maxRate" class="metric-value">--</div>
      </div>
      <div class="metric">
        <div class="metric-label">最高每手保证金</div>
        <div id="maxMargin" class="metric-value">--</div>
      </div>
    </section>

    <section id="content" class="sections" aria-label="保证金卡片">
      <div class="empty">正在加载数据</div>
    </section>
  </main>

  <footer class="wrap">数据由 GitHub Actions 自动更新；页面会自动重载最新保证金比例。</footer>

  <script>
    const EXCHANGE_ORDER = ["SHFE", "DCE", "CZCE", "CFFEX", "INE", "GFEX"];
    const EXCHANGE_COLORS = {
      SHFE: "#3b82f6",
      DCE: "#10b981",
      CZCE: "#f59e0b",
      CFFEX: "#8b5cf6",
      INE: "#06b6d4",
      GFEX: "#ec4899"
    };

    const state = {
      items: [],
      query: "",
      exchange: "",
      updatedAt: "",
      status: "loading"
    };

    const els = {
      content: document.getElementById("content"),
      query: document.getElementById("query"),
      exchange: document.getElementById("exchange"),
      refresh: document.getElementById("refresh"),
      totalCount: document.getElementById("totalCount"),
      visibleCount: document.getElementById("visibleCount"),
      maxRate: document.getElementById("maxRate"),
      maxMargin: document.getElementById("maxMargin"),
      statusDot: document.getElementById("statusDot"),
      statusText: document.getElementById("statusText"),
      updatedAt: document.getElementById("updatedAt")
    };

    function asNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function formatPrice(value) {
      const n = asNumber(value);
      if (n === null) return "--";
      if (Math.abs(n) >= 1000) return n.toLocaleString("zh-CN", { maximumFractionDigits: n % 1 ? 2 : 0 });
      return n.toLocaleString("zh-CN", { minimumFractionDigits: n % 1 ? 2 : 0, maximumFractionDigits: 2 });
    }

    function formatPercent(value) {
      const n = asNumber(value);
      return n === null ? "--" : `${(n * 100).toFixed(1)}%`;
    }

    function formatMoney(value) {
      const n = asNumber(value);
      if (n === null) return "--";
      if (n >= 10000) return `${(n / 10000).toFixed(n >= 100000 ? 1 : 2)}万元`;
      return `${Math.round(n).toLocaleString("zh-CN")}元`;
    }

    function formatOpenInterest(value) {
      const n = asNumber(value);
      if (n === null) return "--";
      if (n >= 10000) return `${(n / 10000).toFixed(1)}万`;
      return Math.round(n).toLocaleString("zh-CN");
    }

    function formatUpdatedAt(value) {
      if (!value) return "更新时间：--";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return `更新时间：${value}`;
      return `更新时间：${date.toLocaleString("zh-CN", { hour12: false })}`;
    }

    function contractText(value) {
      if (!value) return "--";
      const text = String(value);
      const short = text.includes(".") ? text.split(".").pop() : text;
      return `${short} · ${text}`;
    }

    function setStatus(status, text) {
      els.statusDot.className = "dot";
      if (status === "loading" || status === "fallback") els.statusDot.classList.add("warn");
      if (status === "bad") els.statusDot.classList.add("bad");
      els.statusText.textContent = text;
    }

    function normalizePayload(payload) {
      if (!payload || !Array.isArray(payload.items)) {
        throw new Error("数据格式不正确");
      }
      return payload.items
        .filter(item => item && item.code)
        .map(item => ({
          ...item,
          code: String(item.code).toUpperCase(),
          exchange: String(item.exchange || "").toUpperCase(),
          exchangeName: item.exchangeName || item.exchange || "",
          contract: item.contract || ""
        }));
    }

    function fillExchangeOptions(items) {
      const current = state.exchange;
      const exchanges = Array.from(
        new Map(
          items
            .filter(item => item.exchange)
            .map(item => [item.exchange, item.exchangeName || item.exchange])
        ).entries()
      );
      els.exchange.innerHTML =
        '<option value="">全部交易所</option>' +
        exchanges.map(([code, name]) => `<option value="${code}">${name}</option>`).join("");
      els.exchange.value = exchanges.some(([code]) => code === current) ? current : "";
    }

    function filteredItems() {
      const keyword = state.query.trim().toLowerCase();
      return state.items.filter(item => {
        const text = [
          item.name,
          item.code,
          item.exchange,
          item.exchangeName,
          item.contract
        ].join(" ").toLowerCase();
        const queryOk = !keyword || text.includes(keyword);
        const exchangeOk = !state.exchange || item.exchange === state.exchange;
        return queryOk && exchangeOk;
      });
    }

    function render() {
      const rows = filteredItems();
      els.totalCount.textContent = String(state.items.length);
      els.visibleCount.textContent = String(rows.length);

      const maxRate = rows.reduce((max, item) => Math.max(max, asNumber(item.marginRate) || 0), 0);
      const maxMargin = rows.reduce((max, item) => Math.max(max, asNumber(item.marginPerLot) || 0), 0);
      els.maxRate.textContent = maxRate ? formatPercent(maxRate) : "--";
      els.maxMargin.textContent = maxMargin ? formatMoney(maxMargin) : "--";

      if (!rows.length) {
        els.content.innerHTML = '<div class="empty">没有匹配的品种</div>';
        return;
      }

      const groups = new Map();
      rows.forEach(item => {
        const key = item.exchange || "OTHER";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });

      const order = [...EXCHANGE_ORDER, ...Array.from(groups.keys()).filter(key => !EXCHANGE_ORDER.includes(key))];
      els.content.innerHTML = order
        .filter(key => groups.has(key))
        .map(key => {
          const items = groups.get(key).slice().sort((a, b) => (asNumber(b.marginPerLot) || 0) - (asNumber(a.marginPerLot) || 0));
          const color = EXCHANGE_COLORS[key] || "#64748b";
          const name = items[0].exchangeName || key;
          return `
            <section class="exchange-section">
              <div class="exchange-head">
                <div class="exchange-title">
                  <span class="exchange-bar" style="background:${color}"></span>
                  <div>
                    <div class="exchange-name">${name}</div>
                    <div class="exchange-meta">${items.length} 个品种</div>
                  </div>
                </div>
              </div>
              <div class="cards">
                ${items.map(item => `
                  <article class="card" style="--accent:${color}">
                    <div class="card-top">
                      <div class="name">${item.name || "--"}</div>
                      <div class="code">${item.code || "--"}</div>
                    </div>
                    <div class="contract">主力合约：${contractText(item.contract)}</div>
                    <div class="price">${formatPrice(item.price)}</div>
                    <div class="facts">
                      <div class="fact"><span>保证金比例</span><strong>${formatPercent(item.marginRate)}</strong></div>
                      <div class="fact"><span>每手保证金</span><strong class="highlight">${formatMoney(item.marginPerLot)}</strong></div>
                      <div class="fact"><span>合约乘数</span><strong>${asNumber(item.contractMultiplier) ?? "--"}</strong></div>
                      <div class="fact"><span>持仓量</span><strong>${formatOpenInterest(item.openInterest)}</strong></div>
                    </div>
                  </article>
                `).join("")}
              </div>
            </section>
          `;
        })
        .join("");
    }

    async function loadData() {
      setStatus("loading", "正在加载数据");
      const stamp = `t=${Date.now()}`;
      const urls = [`data/data.json?${stamp}`, `data.json?${stamp}`];
      let lastError = null;

      for (const url of urls) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) throw new Error(`${url} ${response.status}`);
          const payload = await response.json();
          state.items = normalizePayload(payload);
          state.updatedAt = payload.updatedAt || "";
          state.status = payload.status || "ok";
          fillExchangeOptions(state.items);
          render();
          setStatus(payload.status === "ok" ? "ok" : "fallback", payload.status === "ok" ? "数据正常" : "备用数据");
          els.updatedAt.textContent = formatUpdatedAt(payload.updatedAt);
          return;
        } catch (error) {
          lastError = error;
        }
      }

      state.items = [];
      render();
      setStatus("bad", "加载失败");
      els.updatedAt.textContent = lastError ? `更新时间：${lastError.message}` : "更新时间：--";
    }

    els.query.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    els.exchange.addEventListener("change", event => {
      state.exchange = event.target.value;
      render();
    });

    els.refresh.addEventListener("click", loadData);

    loadData();
    setInterval(loadData, 120000);
  </script>
</body>
</html>
