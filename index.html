function render(items){

function processData(raw){
  if(!raw||!raw.length)return;
  var items=[];
  FC.forEach(function(c){
    var best=null,bo=0,ms=GM(c[0]),d=new Date(),y=d.getFullYear()%100,cm=d.getMonth()+1,idx=0;
    while(idx<ms.length&&ms[idx]<=cm)idx++;if(idx>=ms.length){idx=0;y++}
    for(var j=0;j<4;j++){
      if(idx>=ms.length){idx=0;y++}var cd=CC(c[0],y,ms[idx]);idx++;
      var row=raw.find(function(x){return x.c===cd});if(!row)continue;
      if(row.o>bo&&row.p>0){bo=row.o;best={d:cd,p:row.p,o:row.o,c:row.ch||0,e:c[2],m:c[3],r:c[4],n:c[1]};}
    }
    if(best&&best.p>0)items.push(best);
  });
  if(items.length>0)render(items);else show("暂无数据","error");
}

  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;
    if(xhr.status===200){try{processData(JSON.parse(xhr.responseText));return}catch(e){}}
    processData(EMBEDDED_DATA);
  };
  xhr.send();
}
document.addEventListener("DOMContentLoaded",function(){refresh();setInterval(refresh,60000);document.getElementById("refreshBtn").addEventListener("click",refresh)});
</script>
