<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>期货保证金监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f5f7fa;color:#1f2937}
h1{background:#1e293b;color:#fff;padding:20px;font-size:18px}
#app{max-width:1400px;margin:0 auto;padding:20px}
.c{background:#fff;border:1px solid #e5e7eb;padding:12px;margin:8px 0;border-radius:8px}
.n{font-weight:600;font-size:16px}
.p{font-size:20px;font-weight:700;color:#2563eb;margin-top:4px}
</style>
</head>
<body>
<h1>📈 期货保证金监控 - 测试页面</h1>
<div id="app"></div>
<script>
(function(){
  // Absolute minimal test - display hardcoded data
  var data = [
    {n:"螺纹钢",c:"RB2607",p:3520,o:180000},
    {n:"铁矿石",c:"I2607",p:825,o:1200000},
    {n:"沪铜",c:"CU2607",p:72500,o:350000},
    {n:"原油",c:"SC2607",p:575,o:150000},
    {n:"黄金",c:"AU2610",p:558,o:400000},
    {n:"沪深300",c:"IF2607",p:3780,o:200000}
  ];
  var ap = document.getElementById("app");
  var h = "";
  for(var i=0;i<data.length;i++){
    var d = data[i];
    h += "<div class=\\"c\\"><div class=\\"n\\">" + d.n + " <span style=\\"color:#9ca3af;font-size:12px;font-weight:400\\">(" + d.c + ")</span></div><div class=\\"p\\">" + d.p + "</div></div>";
  }
  ap.innerHTML = h + "<p style=\\"margin-top:20px;color:#6b7280;font-size:13px\\">测试 - JavaScript 正常运行。共 " + data.length + " 个品种</p>";
  document.title = "期货保证金监控 - 测试OK";
})();
</script>
</body>
</html>
